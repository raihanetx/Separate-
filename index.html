    <!-- Split CSS Files -->
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hamburger.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/product-category.css">
    <link rel="stylesheet" href="css/products.css">
    <link rel="stylesheet" href="css/view-all.css">
    <link rel="stylesheet" href="css/product-details.css">
    <link rel="stylesheet" href="css/add-to-cart.css">
    <link rel="stylesheet" href="css/checkout.css">
    <link rel="stylesheet" href="css/notification.css">
    <link rel="stylesheet" href="css/why-choose-us.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/refund.css">
    <link rel="stylesheet" href="css/privacy-policy.css">
    <link rel="stylesheet" href="css/terms.css">
    <link rel="stylesheet" href="css/orders.css">
</head>
<body>
    <!-- Containers for dynamically loaded HTML -->
    <div id="header-container"></div>
    <div id="hamburger-container"></div>

    <main id="main-container">
        <!-- All page sections will be loaded here by the script below -->
    </main>

    <div id="footer-container"></div>

    <!-- HTML Loader Script -->
    <script>
        async function loadHtml(url, targetElement) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const text = await response.text();
                targetElement.insertAdjacentHTML('beforeend', text);
            } catch (error) {
                console.error(`Failed to load ${url}:`, error);
                targetElement.innerHTML += `<p>Error loading content from ${url}.</p>`;
            }
        }

        async function initializeApp() {
            const mainContainer = document.getElementById('main-container');
            const headerContainer = document.getElementById('header-container');
            const hamburgerContainer = document.getElementById('hamburger-container');
            const footerContainer = document.getElementById('footer-container');

            // Load structural components first
            await loadHtml('header.html', headerContainer);
            await loadHtml('hamburger.html', hamburgerContainer);
            
            // Create a temporary container for homepage sections
            const homePageContainer = document.createElement('div');
            homePageContainer.innerHTML = await (await fetch('home.html')).text();
            
            const homePageContent = homePageContainer.querySelector('#homePage');
            if (homePageContent) {
                 // Load homepage components into the #homePage section
                const heroContent = await (await fetch('hero.html')).text();
                const categoryContent = await (await fetch('product-category.html')).text();
                const productsContent = await (await fetch('products.html')).text();
                const whyChooseUsContent = await (await fetch('why-choose-us.html')).text();
                homePageContent.innerHTML = heroContent + categoryContent + productsContent + whyChooseUsContent;
                mainContainer.appendChild(homePageContent);
            }

            // Load all other page sections directly into the main container
            await loadHtml('view-all.html', mainContainer);
            await loadHtml('product-details.html', mainContainer);
            await loadHtml('add-to-cart.html', mainContainer);
            await loadHtml('checkout.html', mainContainer);
            await loadHtml('notification.html', mainContainer);
            await loadHtml('about.html', mainContainer);
            await loadHtml('refund.html', mainContainer);
            await loadHtml('privacy-policy.html', mainContainer);
            await loadHtml('terms.html', mainContainer);
            await loadHtml('orders.html', mainContainer);

            // Load footer last, as it contains modals that should be at the end of the DOM
            await loadHtml('footer.html', footerContainer);

            // Now that all HTML is loaded, load and execute the main scripts
            const scripts = [
                'js/main.js', 'js/ui.js', 'js/products.js',
                'js/product-details.js', 'js/add-to-cart.js',
                'js/checkout.js', 'js/orders.js'
            ];

            for (const src of scripts) {
                const script = document.createElement('script');
                script.src = src;
                document.body.appendChild(script);
            }
        }

        // Run the app initialization
        initializeApp();
    </script>

</body>
</html>
